name: sim-tests

on:
  push:
    branches: [main]
    paths: ["game/**", ".github/workflows/sim-tests.yml"]
  pull_request:
    paths: ["game/**", ".github/workflows/sim-tests.yml"]

jobs:
  determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Godot version pin
        id: godot
        run: echo "version=$(cat game/.godot-version)" >> "$GITHUB_OUTPUT"

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/.local/opt/godot
          key: godot-${{ steps.godot.outputs.version }}-linux-x86_64

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p ~/.local/opt/godot/${{ steps.godot.outputs.version }}
          curl -sL -o /tmp/godot.zip \
            "https://github.com/godotengine/godot/releases/download/${{ steps.godot.outputs.version }}/Godot_v${{ steps.godot.outputs.version }}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d ~/.local/opt/godot/${{ steps.godot.outputs.version }}

      - name: Run determinism test
        run: |
          set -e
          BIN=$(find ~/.local/opt/godot/${{ steps.godot.outputs.version }} -name 'Godot_*_linux.x86_64' | head -1)
          chmod +x "$BIN"
          "$BIN" --headless --path game --script res://tests/test_determinism.gd
