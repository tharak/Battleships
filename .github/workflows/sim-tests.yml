name: sim-tests

on:
  push:
    branches: [main]
    paths: ["game/**", ".github/workflows/sim-tests.yml"]
  pull_request:
    paths: ["game/**", ".github/workflows/sim-tests.yml"]

jobs:
  determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Godot version pin
        id: godot
        run: echo "version=$(cat game/.godot-version)" >> "$GITHUB_OUTPUT"

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/.local/opt/godot
          key: godot-${{ steps.godot.outputs.version }}-linux-x86_64

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p ~/.local/opt/godot/${{ steps.godot.outputs.version }}
          curl -sL -o /tmp/godot.zip \
            "https://github.com/godotengine/godot/releases/download/${{ steps.godot.outputs.version }}/Godot_v${{ steps.godot.outputs.version }}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d ~/.local/opt/godot/${{ steps.godot.outputs.version }}

      - name: Import project (builds the global class_name cache)
        run: |
          set -e
          BIN=$(find ~/.local/opt/godot/${{ steps.godot.outputs.version }} -name 'Godot_*_linux.x86_64' | head -1)
          chmod +x "$BIN"
          echo "GODOT_BIN=$BIN" >> "$GITHUB_ENV"
          # A fresh checkout has no .godot/ cache (gitignored, regenerated locally on
          # first editor open) — class_name lookups (CommandStream, Sim, ...) fail
          # with "not declared in the current scope" until one import pass builds it.
          "$BIN" --headless --path game --editor --quit

      - name: Run all headless test suites
        run: |
          set -e
          status=0
          for f in game/tests/test_*.gd; do
            name=$(basename "$f")
            echo "::group::$name"
            "$GODOT_BIN" --headless --path game --script "res://tests/$name" || status=1
            echo "::endgroup::"
          done
          exit $status
