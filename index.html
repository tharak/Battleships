<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050812" />
    <title>Space Battleships</title>
  </head>
  <body>
    <main id="app" class="shell">
      <section class="stage" aria-label="Space Battleships tactical map">
        <canvas id="gameCanvas"></canvas>
        <div id="tooltip" class="tooltip" role="status" aria-live="polite"></div>
      </section>
      <aside class="panel" aria-label="Game controls">
        <div>
          <p class="eyebrow">Space Battleships</p>
          <h1>Hex Fleet Command</h1>
        </div>

        <div class="status" id="phaseStatus">Setup: tune fleets, then start battle.</div>

        <section class="info-block">
          <h2>Fleet Status</h2>
          <div id="fleetStatus" class="fleet-status"></div>
        </section>

        <div class="controls">
          <button id="startButton" type="button" class="primary">Start Battle</button>
          <button id="restartButton" type="button">Restart</button>
        </div>


        <details id="debugPanel" class="debug-panel" open>
          <summary>Debug Tuning</summary>

          <section class="debug-section">
            <h2>Boids Steering</h2>
            <label>Separation <input data-config="steering.separation" type="number" min="0" max="10" step="0.1" /></label>
            <label>Cohesion <input data-config="steering.cohesion" type="number" min="0" max="10" step="0.1" /></label>
            <label>Alignment <input data-config="steering.alignment" type="number" min="0" max="10" step="0.1" /></label>
            <label>Target <input data-config="steering.target" type="number" min="0" max="10" step="0.1" /></label>
          </section>

          <section class="debug-section">
            <h2>Enemy Fleet</h2>
            <label>Pattern
              <select data-config="enemyFormation.pattern">
                <option value="1-2-3-4">1-2-3-4</option>
                <option value="3-4-3">3-4-3</option>
                <option value="5-5">5-5</option>
              </select>
            </label>
            <label>Spacing <input data-config="enemyFormation.spacing" type="number" min="0" max="3" step="1" /></label>
            <label>Strategy
              <select data-config="enemyFormation.strategy">
                <option value="attack">attack</option>
                <option value="defense">defense</option>
              </select>
            </label>
          </section>

          <section class="debug-section">
            <h2>Player Fleet</h2>
            <label>Pattern
              <select data-config="playerFormation.pattern">
                <option value="1-2-3-4">1-2-3-4</option>
                <option value="3-4-3">3-4-3</option>
                <option value="5-5">5-5</option>
              </select>
            </label>
            <label>Spacing <input data-config="playerFormation.spacing" type="number" min="0" max="3" step="1" /></label>
            <label>Strategy
              <select data-config="playerFormation.strategy">
                <option value="attack">attack</option>
                <option value="defense">defense</option>
              </select>
            </label>
          </section>

          <section class="debug-section">
            <h2>Ship Stats</h2>
            <label>HP <input data-config="ship.maxHp" type="number" min="1" max="30" step="1" /></label>
            <label>Range <input data-config="ship.range" type="number" min="1" max="12" step="1" /></label>
            <label>Damage <input data-config="ship.damage" type="number" min="1" max="10" step="1" /></label>
          </section>
        </details>

        <div class="hint">
          Tune the player and enemy formations before battle. Both fleets are generated from the selected setup values.
        </div>
      </aside>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
